<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Aventura de Texto</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <div class="passo ativo" id="passo-0">
            <p>Você está na entrada de uma floresta misteriosa. O que deseja fazer?</p>
            <button class="btn-proximo" data-proximo="1">Seguir a trilha de flores</button>
            <button class="btn-proximo" data-proximo="2">Entrar na caverna escura</button>
        </div>

        <div class="passo" id="passo-1">
            <p>A trilha de flores te leva a um jardim mágico. Você encontrou um baú!</p>
            <button class="btn-voltar" data-voltar="0">Voltar ao início</button>
        </div>

        <div class="passo" id="passo-2">
            <p>A caverna é muito escura e você ouve um rosnado...</p>
            <button class="btn-proximo" data-proximo="3">Investigar o som</button>
            <button class="btn-voltar" data-voltar="0">Recuar estrategicamente</button>
        </div>

        <div class="passo" id="passo-3">
            <p>Era apenas um urso dormindo. Você sobreviveu!</p>
            <button class="btn-voltar" data-voltar="2">Voltar para a entrada da caverna</button>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
